<!DOCTYPE html>
<html>
<head>
    <title>Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Test</h1>
    <button id="loginButton">Test Login</button>
    <div id="result"></div>
    <script>
        const supabaseUrl = 'https://ducqtalkhvizusgnqlxx.supabase.co';
        const supabaseKey = 'sb_publishable_lViRN7oDzpCqap-_aykfKw_pXizyP8h';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('loginButton').onclick = async () => {
            document.getElementById('result').innerHTML = 'Starte...';
            try {
                const { data, error } = await supabase.auth.signInWithOAuth({
                    provider: 'github',
                    options: { redirectTo: window.location.origin }
                });
                if (error) {
                    document.getElementById('result').innerHTML = 'Fehler: ' + error.message;
                } else {
                    document.getElementById('result').innerHTML = 'Weiterleitung...';
                }
            } catch (err) {
                document.getElementById('result').innerHTML = 'Exception: ' + err.message;
            }
        };
    </script>
</body>
</html>
